version: '3.6'
services:
  backend:
    build: backend
    hostname: backend-host
    volumes:
      - ./backend:/app
    environment:
      - MONGO_HOST=mongodb+srv://testuser:testuser@snapped-blogs.tf2wdde.mongodb.net/?appName=snapped-blogs
    ports:
      - "8000:8000"
    networks:
      - project-network
  frontend:
    build: frontend
    hostname: frontend-host
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend-host:8000
    ports:
      - "3000:3000"   
    links:
      - backend
    depends_on:
      - backend
    networks:
      - project-network
networks:
  project-network: {}